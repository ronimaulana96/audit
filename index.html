<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Audit 5S</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- ================= HEADER ================= -->

    <header class="header">

        <div class="logo">
            🏭
        </div>

        <div class="title">

            <h1>AUDIT 5S</h1>

            <p>PT SEIKOU SEAT COVER</p>

        </div>

    </header>

    <!-- ================= CONTENT ================= -->

    <div class="container">

        <!-- Data Auditor -->

        <div class="card">

            <h2>📋 Informasi Audit</h2>

            <div class="input-group">

                <label>Nama Auditor</label>

                <input type="text" id="nama" placeholder="Masukkan nama auditor">

            </div>

            <div class="input-group">

                <label>Departemen</label>

                <input type="text" id="departemen" placeholder="Masukkan departemen">

            </div>

            <div class="input-group">

                <label>Area Audit</label>

                <input type="text" id="area" placeholder="Masukkan area">

            </div>

            <div class="input-group">

                <label>Tanggal</label>

                <input type="date" id="tanggal">

            </div>

        </div>

        <!-- Penilaian -->

        <div class="card">

            <h2>⭐ Penilaian 5S</h2>

            <div class="score">

                <label>Seiri</label>

                <select id="seiri">
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                </select>

            </div>

            <div class="score">

                <label>Seiton</label>

                <select id="seiton">
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                </select>

            </div>

            <div class="score">

                <label>Seiso</label>

                <select id="seiso">
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                </select>

            </div>

            <div class="score">

                <label>Seiketsu</label>

                <select id="seiketsu">
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                </select>

            </div>

            <div class="score">

                <label>Shitsuke</label>

                <select id="shitsuke">
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                </select>

            </div>

        </div>

        <!-- Temuan -->

        <div class="card">

            <h2>📝 Temuan</h2>

            <textarea id="temuan" rows="5" placeholder="Masukkan hasil temuan audit..."></textarea>

        </div>

        <!-- Upload -->

        <div class="card">

            <h2>📷 Bukti Temuan</h2>

            <input type="file" id="foto">

        </div>

        <!-- Tombol -->

        <button class="btn" onclick="hitung()">

            Hitung Nilai

        </button>

        <!-- Hasil -->

        <div class="hasil" id="hasil">

            <h2>Hasil Audit</h2>

            <h1 id="persen">0%</h1>

            <h3 id="kategori">-</h3>

            <p>Total Nilai : <span id="total">0</span></p>

        </div>

    </div>

    <!-- Footer -->

    <footer>

        Developed by Roni Maulana © 2026

    </footer>

    <script src="script.js"></script>

</body>

</html>
